<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates V3 – Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0F0F1A;
      color: #E2E8F0;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── App Layout ──────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100vh;
    }

    /* ─── Header ──────────────────────────────────────────────── */
    .header {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 10;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      background: linear-gradient(135deg, #6366F1, #F29F40);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-logo span { font-size: 22px; }

    .header-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(99, 102, 241, 0.15);
      color: #818CF8;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .save-status {
      font-size: 12px;
      color: #71717A;
      transition: all 0.3s;
    }
    .save-status.saved { color: #22C55E; }
    .save-status.saving { color: #F29F40; }

    /* ─── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      background: #12121F;
      border-right: 1px solid rgba(99, 102, 241, 0.1);
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 4px; }

    .sidebar-group {
      margin-bottom: 8px;
    }

    .sidebar-group-title {
      padding: 8px 20px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: #71717A;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #A1A1AA;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      background: rgba(99, 102, 241, 0.06);
      color: #E2E8F0;
    }

    .sidebar-item.active {
      background: rgba(99, 102, 241, 0.1);
      color: #FFFFFF;
      border-left-color: #6366F1;
      font-weight: 500;
    }

    .sidebar-item .icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
    .sidebar-item .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-item .cat-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cat-badge.member { background: rgba(242,159,64,0.15); color: #F29F40; }
    .cat-badge.manager { background: rgba(99,102,241,0.15); color: #818CF8; }
    .cat-badge.layout { background: rgba(34,197,94,0.15); color: #22C55E; }

    /* ─── Main Content ────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-rows: 48px 1fr;
      overflow: hidden;
    }

    /* ─── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      background: #16162A;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .toolbar-tab {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      color: #71717A;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
      font-family: 'Poppins', sans-serif;
      border: none;
      background: none;
    }

    .toolbar-tab:hover { color: #E2E8F0; background: rgba(255,255,255,0.04); }
    .toolbar-tab.active { color: #FFFFFF; background: rgba(99, 102, 241, 0.15); }

    .toolbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); margin: 0 4px; }

    .toolbar-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-btn.save {
      background: linear-gradient(135deg, #F29F40, #E8912E);
      color: #FFF;
      margin-left: auto;
    }
    .toolbar-btn.save:hover { box-shadow: 0 4px 14px rgba(242, 159, 64, 0.35); transform: translateY(-1px); }
    .toolbar-btn.save:active { transform: translateY(0); }

    /* ─── Content Panels ──────────────────────────────────────── */
    .content {
      display: grid;
      overflow: hidden;
    }

    .content.split { grid-template-columns: 1fr 1fr; }
    .content.preview-only { grid-template-columns: 1fr; }
    .content.editor-only { grid-template-columns: 1fr; }

    /* ─── Editor ──────────────────────────────────────────────── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(99, 102, 241, 0.1);
    }

    .editor-panel .panel-header {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: #71717A;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(99, 102, 241, 0.08);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .editor-panel .panel-header .dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; }

    #code-editor {
      flex: 1;
      width: 100%;
      background: #0D0D17;
      color: #C4B5FD;
      border: none;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
      overflow-y: auto;
    }

    #code-editor::-webkit-scrollbar { width: 6px; }
    #code-editor::-webkit-scrollbar-track { background: transparent; }
    #code-editor::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.25); border-radius: 4px; }

    /* ─── Preview ─────────────────────────────────────────────── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #E5E7EB;
    }

    .preview-panel .panel-header {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: #71717A;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #1A1A2E;
      border-bottom: 1px solid rgba(99, 102, 241, 0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .preview-panel .panel-header .device-buttons {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .device-btn {
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: none;
      color: #71717A;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }
    .device-btn.active { background: rgba(99,102,241,0.15); color: #818CF8; border-color: rgba(99,102,241,0.3); }

    .preview-frame-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      overflow-y: auto;
      background: #D4D4D8;
    }

    #preview-frame {
      width: 100%;
      max-width: 640px;
      border: none;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transition: max-width 0.3s ease;
      min-height: 400px;
    }

    #preview-frame.mobile { max-width: 375px; }
    #preview-frame.tablet { max-width: 480px; }

    /* ─── Empty State ─────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #52525B;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }

    /* ─── Keyboard Shortcut Toast ─────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(34, 197, 94, 0.95);
      color: #FFF;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: rgba(239, 68, 68, 0.95); box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3); }

    /* ─── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

<div class="app">

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-logo">
      <span>📧</span> Templates V3
    </div>
    <div class="header-info">
      <span class="header-badge" id="template-count">📋 0 templates</span>
      <span class="save-status" id="save-status"></span>
    </div>
  </header>

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <!-- populated by JS -->
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="toolbar-tab active" data-view="split" onclick="setView('split')">⬜ Split</button>
      <button class="toolbar-tab" data-view="editor-only" onclick="setView('editor-only')">✏️ Editor</button>
      <button class="toolbar-tab" data-view="preview-only" onclick="setView('preview-only')">👁️ Preview</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-tab" onclick="refreshPreview()">🔄 Refresh</button>
      <button class="toolbar-btn save" id="btn-save" onclick="saveTemplate()">💾 Salvar <kbd style="font-size:10px;opacity:0.7;margin-left:4px;">⌘S</kbd></button>
    </div>

    <!-- Content Area -->
    <div class="content split" id="content">

      <!-- Empty State (shown initially) -->
      <div class="empty-state" id="empty-state" style="grid-column: 1/-1;">
        <div class="icon">📧</div>
        <p>Selecione um template na barra lateral para começar</p>
        <p style="font-size: 12px; color: #3F3F46;">⌘S para salvar · Edição em tempo real</p>
      </div>

      <!-- Editor Panel -->
      <div class="editor-panel" id="editor-panel" style="display:none;">
        <div class="panel-header">
          <span class="dot"></span>
          <span id="editor-filename">editor</span>
        </div>
        <textarea id="code-editor" spellcheck="false"></textarea>
      </div>

      <!-- Preview Panel -->
      <div class="preview-panel" id="preview-panel" style="display:none;">
        <div class="panel-header">
          <span>👁️ Preview</span>
          <div class="device-buttons">
            <button class="device-btn" onclick="setDevice('mobile')">📱</button>
            <button class="device-btn" onclick="setDevice('tablet')">📱+</button>
            <button class="device-btn active" onclick="setDevice('desktop')">🖥️</button>
          </div>
        </div>
        <div class="preview-frame-wrapper">
          <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Templates V3 Editor – Client
// ═══════════════════════════════════════════════════════════════════════════

let templates = [];
let currentTemplate = null;
let layoutHtml = '';
let sampleData = {};
let isDirty = false;
let currentView = 'split';

// ─── Boot ────────────────────────────────────────────────────────────────
async function init() {
  const [tpl, layout, data] = await Promise.all([
    fetch('/api/templates').then(r => r.json()),
    fetch('/api/layout').then(r => r.json()),
    fetch('/api/sample-data').then(r => r.json())
  ]);

  templates = tpl;
  layoutHtml = layout.content;
  sampleData = data;

  document.getElementById('template-count').textContent = `📋 ${templates.length} templates`;

  renderSidebar();
}

// ─── Sidebar ─────────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {
    layout: { title: '🎨 Layout', items: [] },
    general: { title: '📧 Gerais', items: [] },
    member: { title: '👤 Membro', items: [] },
    manager: { title: '👔 Gestor', items: [] }
  };

  const icons = {
    'base_layout': '🎨', 'welcome': '🎉', 'password_reset': '🔐',
    'order_confirmation': '✅', 'order_status_update': '📋', 'invoice': '📄',
    'onboarding_invite': '🎁', 'points_added': '⭐', 'points_spent': '💸',
    'order_status': '📦', 'campaign_invite': '🎉',
    'user_created': '👤', 'campaign_sent': '📤', 'campaign_started': '🚀',
    'campaign_ended': '🏁', 'gift_created': '🎁', 'gift_status': '📋',
    'crud_update': '🔔', 'low_stock': '⚠️'
  };

  templates.forEach(t => {
    if (groups[t.category]) groups[t.category].items.push(t);
  });

  let html = '';
  for (const [key, group] of Object.entries(groups)) {
    if (group.items.length === 0) continue;
    html += `<div class="sidebar-group">`;
    html += `<div class="sidebar-group-title">${group.title}</div>`;
    group.items.forEach(t => {
      const icon = icons[t.name] || '📄';
      const badge = key !== 'general' ? `<span class="cat-badge ${key}">${key}</span>` : '';
      const label = t.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `<div class="sidebar-item" data-id="${t.id}" onclick="selectTemplate('${t.id}')">
        <span class="icon">${icon}</span>
        <span class="label">${label}</span>
        ${badge}
      </div>`;
    });
    html += `</div>`;
  }

  sidebar.innerHTML = html;
}

// ─── Select Template ─────────────────────────────────────────────────────
async function selectTemplate(id) {
  if (isDirty && currentTemplate) {
    if (!confirm('Alterações não salvas. Deseja continuar?')) return;
  }

  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.sidebar-item[data-id="${id}"]`)?.classList.add('active');

  // Fetch content
  const res = await fetch(`/api/template?path=${encodeURIComponent(id)}`);
  const data = await res.json();

  currentTemplate = templates.find(t => t.id === id);

  // Show panels
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor-panel').style.display = 'flex';
  document.getElementById('preview-panel').style.display = 'flex';
  applyView();

  // Set editor
  const editor = document.getElementById('code-editor');
  editor.value = data.content;
  document.getElementById('editor-filename').textContent = id;

  isDirty = false;
  updateSaveStatus('');

  refreshPreview();
}

// ─── Preview ─────────────────────────────────────────────────────────────
function refreshPreview() {
  if (!currentTemplate) return;

  const editor = document.getElementById('code-editor');
  let html = editor.value;

  // If not layout itself, wrap in layout
  if (currentTemplate.category !== 'layout') {
    html = layoutHtml.replace('{{{ @content }}}', html);
  }

  // Do basic variable substitution for preview
  html = substituteVars(html, sampleData);

  const iframe = document.getElementById('preview-frame');
  iframe.srcdoc = html;

  // Auto-resize iframe after load
  iframe.onload = () => {
    try {
      const body = iframe.contentDocument.body;
      if (body) {
        iframe.style.height = Math.max(400, body.scrollHeight + 40) + 'px';
      }
    } catch(e) {}
  };
}

// ─── Variable Substitution ───────────────────────────────────────────────
function substituteVars(html, data, depth = 0) {
  if (depth > 5) return html;

  // Handle {{#each items}} ... {{/each}}
  html = html.replace(/\{\{#each\s+(\w+)\}\}([\s\S]*?)\{\{\/each\}\}/g, (match, key, inner) => {
    const arr = data[key];
    if (!Array.isArray(arr)) return '';
    return arr.map(item => substituteVars(inner, { ...data, ...item }, depth + 1)).join('');
  });

  // Handle {{#key}} ... {{/key}} (conditional)
  html = html.replace(/\{\{#(\w+(?:\.\w+)*)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (match, key, inner) => {
    const val = getNestedValue(data, key);
    return val ? substituteVars(inner, data, depth + 1) : '';
  });

  // Handle {{^key}} ... {{/key}} (inverted conditional)
  html = html.replace(/\{\{\^(\w+(?:\.\w+)*)\}\}([\s\S]*?)\{\{\/\1\}\}/g, (match, key, inner) => {
    const val = getNestedValue(data, key);
    return !val ? substituteVars(inner, data, depth + 1) : '';
  });

  // Handle {{{ var }}} (unescaped)
  html = html.replace(/\{\{\{\s*(\w+(?:\.\w+)*)\s*\}\}\}/g, (match, key) => {
    const val = getNestedValue(data, key);
    return val !== undefined ? String(val) : match;
  });

  // Handle {{ var }}
  html = html.replace(/\{\{\s*(\w+(?:\.\w+)*)\s*\}\}/g, (match, key) => {
    const val = getNestedValue(data, key);
    return val !== undefined ? String(val) : match;
  });

  return html;
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}

// ─── Save ────────────────────────────────────────────────────────────────
async function saveTemplate() {
  if (!currentTemplate) return;

  updateSaveStatus('saving');

  try {
    const editor = document.getElementById('code-editor');
    const res = await fetch(`/api/template?path=${encodeURIComponent(currentTemplate.id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: editor.value })
    });

    if (!res.ok) throw new Error('Save failed');

    isDirty = false;
    updateSaveStatus('saved');
    showToast('✅ Template salvo com sucesso!');

    // Also refresh preview
    refreshPreview();
  } catch (err) {
    updateSaveStatus('');
    showToast('❌ Erro ao salvar: ' + err.message, true);
  }
}

// ─── View Modes ──────────────────────────────────────────────────────────
function setView(view) {
  currentView = view;
  document.querySelectorAll('.toolbar-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  applyView();
}

function applyView() {
  const content = document.getElementById('content');
  const editor = document.getElementById('editor-panel');
  const preview = document.getElementById('preview-panel');

  content.className = 'content ' + currentView;

  if (currentTemplate) {
    editor.style.display = currentView === 'preview-only' ? 'none' : 'flex';
    preview.style.display = currentView === 'editor-only' ? 'none' : 'flex';
  }
}

// ─── Device Preview ──────────────────────────────────────────────────────
function setDevice(device) {
  const frame = document.getElementById('preview-frame');
  frame.className = '';
  if (device !== 'desktop') frame.classList.add(device);
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ─── Save Status ─────────────────────────────────────────────────────────
function updateSaveStatus(state) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + state;
  if (state === 'saving') el.textContent = '⏳ Salvando...';
  else if (state === 'saved') el.textContent = '✅ Salvo';
  else el.textContent = '';
}

// ─── Toast ───────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { toast.className = 'toast'; }, 2500);
}

// ─── Keyboard Shortcuts ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveTemplate();
  }
});

// ─── Editor Events ───────────────────────────────────────────────────────
document.getElementById('code-editor').addEventListener('input', () => {
  isDirty = true;
  updateSaveStatus('');
  // Debounced preview refresh
  clearTimeout(window._previewTimer);
  window._previewTimer = setTimeout(refreshPreview, 500);
});

// Handle tab key in editor
document.getElementById('code-editor').addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target;
    const start = el.selectionStart;
    const end = el.selectionEnd;
    el.value = el.value.substring(0, start) + '  ' + el.value.substring(end);
    el.selectionStart = el.selectionEnd = start + 2;
  }
});

// ─── Init ────────────────────────────────────────────────────────────────
init();
</script>

</body>
</html>
